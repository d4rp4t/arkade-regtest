# Ark application layer for arkade-regtest.
#
# Layered on top of docker/compose.base.yml in the same `docker compose -f base
# -f ark` invocation, so it shares the base project's network. Every service is
# reachable by service name (bitcoin, postgres, nbxplorer, mempool_web, arkd...).
#
# arkd + arkd-wallet are ALWAYS run from our own pinned images — there is no
# longer a "nigiri built-in arkd" to fall back to, so the old built-in/override
# duality is gone and arkd's container name is canonically `arkd`.
#
# The emulator (arkade-script signing service) lives here under the `emulator`
# compose profile: it is started only when the orchestrator passes
# `--profile emulator`, and the orchestrator brings it up last (after arkd is
# wallet-ready) so EMULATOR_ARKD_URL resolves to a live arkd.
name: arkade-regtest

services:
  # ── arkd wallet (signer + on-chain wallet, backed by nbxplorer) ────────────
  arkd-wallet:
    image: ${ARKD_WALLET_IMAGE:-ghcr.io/arkade-os/arkd-wallet:v0.9.9-rc.1}
    container_name: arkd-wallet
    profiles: ["ark"]
    restart: unless-stopped
    # Wait for nbxplorer to be healthy (HTTP port listening) — not just started —
    # so arkd-wallet doesn't crash on "lookup nbxplorer: no such host" during
    # nbxplorer's first-boot DB migration, which otherwise crash-loops arkd too.
    depends_on:
      bitcoin:
        condition: service_started
      nbxplorer:
        condition: service_healthy
    environment:
      - ARKD_WALLET_LOG_LEVEL=5
      - ARKD_WALLET_NBXPLORER_URL=http://nbxplorer:32838
      - ARKD_WALLET_NETWORK=regtest
      # Default to a KNOWN regtest signer key so arkd-wallet does not self-generate
      # one. Signer rotation needs the *current* signer's private key to advertise
      # it as a deprecated signer on rotation; a self-generated key is unknown to
      # the CLI and cannot be deprecated. (Matches arkd's own e2e default.)
      - ARKD_WALLET_SIGNER_KEY=${ARKD_WALLET_SIGNER_KEY:-afcd3fa10f82a05fddc9574fdb13b3991b568e89cc39a72ba4401df8abef35f0}
      - ARKD_WALLET_DEPRECATED_SIGNER_KEYS=${ARKD_WALLET_DEPRECATED_SIGNER_KEYS:-}
    ports:
      - '${ARKD_WALLET_PORT:-6060}:6060'
    volumes:
      - ark_wallet_datadir:/app/data

  # ── arkd (Ark server) ──────────────────────────────────────────────────────
  arkd:
    image: ${ARKD_IMAGE:-ghcr.io/arkade-os/arkd:v0.9.9-rc.1}
    container_name: arkd
    profiles: ["ark"]
    restart: unless-stopped
    depends_on:
      - arkd-wallet
    environment:
      - ARKD_NO_TLS=true
      - ARKD_NO_MACAROONS=true
      - ARKD_WALLET_ADDR=arkd-wallet:6060
      - ARKD_ESPLORA_URL=http://mempool_web/api
      - ARKD_VTXO_MIN_AMOUNT=1
      - ARKD_DB_TYPE=sqlite
      - ARKD_EVENT_DB_TYPE=badger
      - ARKD_UNLOCKER_TYPE=env
      - ARKD_UNLOCKER_PASSWORD=${ARKD_PASSWORD:-secret}
      - ARKD_VTXO_TREE_EXPIRY=${ARKD_VTXO_TREE_EXPIRY:-1024}
      - ARKD_UNILATERAL_EXIT_DELAY=${ARKD_UNILATERAL_EXIT_DELAY:-512}
      - ARKD_PUBLIC_UNILATERAL_EXIT_DELAY=${ARKD_PUBLIC_UNILATERAL_EXIT_DELAY:-512}
      - ARKD_BOARDING_EXIT_DELAY=${ARKD_BOARDING_EXIT_DELAY:-2048}
      - ARKD_CHECKPOINT_EXIT_DELAY=${ARKD_CHECKPOINT_EXIT_DELAY:-1024}
      - ARKD_LIVE_STORE_TYPE=${ARKD_LIVE_STORE_TYPE:-inmemory}
      - ARKD_LOG_LEVEL=${ARKD_LOG_LEVEL:-4}
      - ARKD_SESSION_DURATION=${ARKD_SESSION_DURATION:-30}
      # Single-participant rounds by default so a lone client can `ark settle`
      # in regtest (tests rarely have multiple simultaneous participants).
      - ARKD_ROUND_MIN_PARTICIPANTS_COUNT=${ARKD_ROUND_MIN_PARTICIPANTS_COUNT:-1}
      - ARK_OFFCHAIN_INPUT_FEE=${ARK_OFFCHAIN_INPUT_FEE:-amount * 0.01}
      - ARK_ONCHAIN_INPUT_FEE=${ARK_ONCHAIN_INPUT_FEE:-amount * 0.01}
      - ARK_OFFCHAIN_OUTPUT_FEE=${ARK_OFFCHAIN_OUTPUT_FEE:-0.0}
      - ARK_ONCHAIN_OUTPUT_FEE=${ARK_ONCHAIN_OUTPUT_FEE:-250.0}
    ports:
      - '${ARKD_PORT:-7070}:7070'
      - '${ARKD_ADMIN_PORT:-7071}:7071'
    volumes:
      - ark_datadir:/app/data

  # ── Boltz LND (swap counterparty wallet) ───────────────────────────────────
  boltz-lnd:
    image: ${BOLTZ_LND_IMAGE:-btcpayserver/lnd:v0.19.3-beta}
    restart: unless-stopped
    container_name: boltz-lnd
    profiles: ["boltz"]
    environment:
      LND_CHAIN: 'btc'
      LND_ENVIRONMENT: 'regtest'
      LND_EXPLORERURL: 'http://nbxplorer:32838/'
      LND_REST_LISTEN_HOST: http://boltz-lnd:8080
      LND_EXTRA_ARGS: |
        bitcoin.node=bitcoind
        maxpendingchannels=10
        rpclisten=0.0.0.0:10009
        restlisten=boltz-lnd:8080
        bitcoind.rpchost=bitcoin:18443
        bitcoind.rpcuser=admin1
        bitcoind.rpcpass=123
        bitcoind.zmqpubrawblock=tcp://bitcoin:28332
        bitcoind.zmqpubrawtx=tcp://bitcoin:28333
        db.bolt.auto-compact=true
        db.prune-revocation=true
        alias=Ark Labs
        externalip=boltz-lnd:9735
        protocol.option-scid-alias=true
        protocol.wumbo-channels=true
        accept-keysend=true
        minchansize=25000
        noseedbackup=false
        gc-canceled-invoices-on-startup=true
        coin-selection-strategy=random
        protocol.custom-message=513
        protocol.custom-nodeann=39
        protocol.custom-init=39
        no-rest-tls=1
        tlsextradomain=boltz-lnd
        debuglevel=debug
        restcors=*
    volumes:
      - boltz_lnd_datadir:/root/.lnd
    ports:
      - '${BOLTZ_LND_P2P_PORT:-9736}:9735'
      - '${BOLTZ_LND_RPC_PORT:-10010}:10009'

  # ── Fulmine (Ark wallet daemon, Boltz-integrated) ──────────────────────────
  boltz-fulmine:
    image: ${FULMINE_IMAGE:-ghcr.io/arklabshq/fulmine:v0.3.23}
    container_name: boltz-fulmine
    profiles: ["boltz"]
    environment:
      - FULMINE_ARK_SERVER=http://arkd:7070
      - FULMINE_ESPLORA_URL=http://mempool_web/api
      - FULMINE_NO_MACAROONS=true
      - FULMINE_BOLTZ_URL=http://boltz:9001
      - FULMINE_BOLTZ_WS_URL=ws://boltz:9001
      - FULMINE_DISABLE_TELEMETRY=true
      - FULMINE_UNLOCKER_TYPE=env
      - FULMINE_UNLOCKER_PASSWORD=password
      - FULMINE_LND_URL=http://boltz-lnd:10009
      - FULMINE_LND_DATADIR=/root/.lnd
      - FULMINE_DELEGATOR_ENABLED=true
      - FULMINE_DELEGATOR_FEE=350
    ports:
      - ${FULMINE_GRPC_PORT:-7004}:7000
      - ${FULMINE_API_PORT:-7003}:7001
      - ${FULMINE_HTTP_PORT:-7002}:7002
    volumes:
      - boltz_fulmine_datadir:/app/data
      - boltz_lnd_datadir:/root/.lnd
    restart: unless-stopped

  fulmine-delegator:
    image: ${FULMINE_IMAGE:-ghcr.io/arklabshq/fulmine:v0.3.23}
    container_name: fulmine-delegator
    profiles: ["delegate"]
    environment:
      - FULMINE_ARK_SERVER=http://arkd:7070
      - FULMINE_ESPLORA_URL=http://mempool_web/api
      - FULMINE_NO_MACAROONS=true
      - FULMINE_DISABLE_TELEMETRY=true
      - FULMINE_UNLOCKER_TYPE=env
      - FULMINE_UNLOCKER_PASSWORD=password
      - FULMINE_DELEGATOR_ENABLED=true
    ports:
      - ${DELEGATOR_GRPC_PORT:-7010}:7000
      - ${DELEGATOR_API_PORT:-7011}:7001
      - ${DELEGATOR_HTTP_PORT:-7012}:7002
    volumes:
      - fulmine_delegator_datadir:/app/data
    restart: unless-stopped

  # ── Boltz (swap server) ────────────────────────────────────────────────────
  boltz:
    image: ${BOLTZ_IMAGE:-boltz/boltz:latest}
    container_name: boltz
    profiles: ["boltz"]
    restart: unless-stopped
    ports:
      - '${BOLTZ_GRPC_PORT:-9000}:9000'
      - '${BOLTZ_API_PORT:-9001}:9001'
      - '${BOLTZ_WS_PORT:-9004}:9004'
    expose:
      - '9001'
    environment:
      BOLTZ_CONFIG: |
        loglevel = "debug"
        network = "regtest"

        [ark]
        host = "boltz-fulmine"
        port = 7000
        useLocktimeSeconds = true
        rescanInterval = 30

        [ark.unilateralDelays]
        claim = 444
        refund = 444
        refundWithoutReceiver = 720

        [api]
        host = "0.0.0.0"
        port = 9001
        cors = "*"

        [grpc]
        host = "0.0.0.0"
        port = 9000

        [sidecar]
        [sidecar.grpc]
        host = "0.0.0.0"
        port = 9003

        [sidecar.ws]
        host = "0.0.0.0"
        port = 9004

        [sidecar.api]
        host = "0.0.0.0"
        port = 9005

        [postgres]
        host = "postgres"
        port = 5432
        database = "boltz"
        username = "postgres"
        password = "postgres"

        [swap]
        deferredClaimSymbols = [ "BTC" ]

        [[pairs]]
        base = "ARK"
        quote = "BTC"
        rate = 1
        fee = 0.4
        swapInFee = 0.01
        invoiceExpiry = 3600
        maxSwapAmount = 4294967
        minSwapAmount = 1000

        [pairs.timeoutDelta]
        reverse = 1440
        chain = 1440
        swapMinimal = 1440
        swapMaximal = 2880
        swapTaproot = 10080

        [[currencies]]
        symbol = "BTC"
        network = "bitcoinRegtest"
        minWalletBalance = 10000000
        minLocalBalance = 10000000
        minRemoteBalance = 10000000
        maxSwapAmount = 4294967
        minSwapAmount = 50000
        maxZeroConfAmount = 100000
        preferredWallet = "core"

        [currencies.chain]
        host = "bitcoin"
        port = 18443
        user = "admin1"
        password = "123"
        zmqpubrawtx = "tcp://bitcoin:28333"
        zmqpubrawblock = "tcp://bitcoin:28332"

        [[currencies.lnds]]
        host = "boltz-lnd"
        port = 10009
        certpath = "/home/boltz/.lnd/tls.cert"
        macaroonpath = "/home/boltz/.lnd/data/chain/bitcoin/regtest/admin.macaroon"
    volumes:
      - boltz_datadir:/home/boltz/.boltz
      - boltz_lnd_datadir:/home/boltz/.lnd
    entrypoint:
      - sh
      - -c
      - |
        # Wait for postgres to be ready
        until PGPASSWORD=postgres psql -h postgres -U postgres -c '\q' 2>/dev/null; do
          echo "Waiting for postgres..."
          sleep 1
        done

        # Create database if it doesn't exist (postgres uses trust auth here)
        PGPASSWORD=postgres psql -h postgres -U postgres -tc "SELECT 1 FROM pg_database WHERE datname = 'boltz'" | grep -q 1 || \
        PGPASSWORD=postgres psql -h postgres -U postgres -c "CREATE DATABASE boltz"

        # Start boltzd
        echo "$$BOLTZ_CONFIG" > /home/boltz/.boltz/boltz.config
        boltzd --datadir /home/boltz/.boltz --configpath /home/boltz/.boltz/boltz.config

  # ── Boltz CORS proxy ───────────────────────────────────────────────────────
  nginx-boltz:
    image: ${NGINX_IMAGE:-nginx:alpine}
    container_name: nginx-boltz
    profiles: ["boltz"]
    restart: unless-stopped
    ports:
      - '${NGINX_PORT:-9069}:9069'
    volumes:
      - ./cors.nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - boltz

  # ── LNURL server ───────────────────────────────────────────────────────────
  lnurl-server:
    image: ${LNURL_IMAGE:-ghcr.io/arklabshq/lnurl-server:0.1.0}
    container_name: lnurl-server
    profiles: ["boltz"]
    ports:
      - '${LNURL_PORT:-9090}:3000'
    environment:
      - PORT=3000
      - BASE_URL=http://localhost:${LNURL_PORT:-9090}
      - MIN_SENDABLE=1000
      - MAX_SENDABLE=100000000000
      - INVOICE_TIMEOUT_MS=30000
    restart: unless-stopped

  # ── Arkade web wallet ──────────────────────────────────────────────────────
  arkade-wallet:
    image: ${WALLET_IMAGE:-ghcr.io/arkade-os/wallet:latest}
    container_name: arkade-wallet
    profiles: ["ark"]
    ports:
      - '${WALLET_PORT:-3003}:80'
    environment:
      - VITE_ARK_SERVER=http://localhost:7070
      - VITE_BOLTZ_URL=http://localhost:${NGINX_PORT:-9069}
      - VITE_NOSTR_RELAY_URL=ws://localhost:10547
      - VITE_DELEGATOR_URL=http://localhost:${DELEGATOR_HTTP_PORT:-7012}
      - VITE_LNURL_SERVER_URL=http://localhost:${LNURL_PORT:-9090}
    restart: unless-stopped

  # ── Arkade explorer (static web UI, repointed at the local arkd) ───────────
  arkade-explorer:
    image: ${EXPLORER_IMAGE:-ghcr.io/arklabshq/arkade-explorer:latest}
    container_name: arkade-explorer
    profiles: ["ark"]
    restart: unless-stopped
    depends_on:
      - arkd
    command:
      - sh
      - -c
      - |
        sed -i 's|https://arkade.computer|http://localhost:7070|g' /usr/share/nginx/html/assets/*.js &&
        nginx -g 'daemon off;'
    ports:
      - '${EXPLORER_PORT:-7080}:80'

  # ── Emulator (arkade-script signing service) — profile-gated, started last ──
  emulator:
    image: ${EMULATOR_IMAGE:-ghcr.io/arkade-os/emulator:v0.0.1}
    container_name: emulator
    restart: unless-stopped
    profiles:
      - emulator
    ports:
      - '${EMULATOR_PORT:-7073}:7073'
    environment:
      EMULATOR_NO_TLS: 'true'
      EMULATOR_SECRET_KEY: ${EMULATOR_SECRET_KEY}
      EMULATOR_PORT: '7073'
      EMULATOR_LOG_LEVEL: ${EMULATOR_LOG_LEVEL:-4}
      EMULATOR_ARKD_URL: ${EMULATOR_ARKD_URL:-arkd:7070}
    volumes:
      - type: tmpfs
        target: /app/data

  # ── Solver (arkade virtual-mempool intent solver) — profile `solver` ───────
  # Depends on arkd (SOLVER_ARK_URL) and the emulator (SOLVER_EMULATOR_URL), so
  # the orchestrator's `solver` profile also pulls in `ark` and `emulator`.
  # solverd's own listeners stay on the in-container 7070/7071 defaults; only
  # the host ports are remapped (7090/7091) to avoid colliding with arkd.
  solver:
    image: ${SOLVER_IMAGE:-ghcr.io/arkade-os/solver:v0.0.1-rc.2}
    container_name: solver
    profiles: ["solver"]
    restart: unless-stopped
    depends_on:
      - arkd
    environment:
      SOLVER_ARK_URL: arkd:7070
      SOLVER_EMULATOR_URL: http://emulator:7073
      SOLVER_WALLET_SEED: ${SOLVER_WALLET_SEED}
      SOLVER_WALLET_PASSWORD: ${SOLVER_WALLET_PASSWORD:-password}
      SOLVER_LOG_LEVEL: ${SOLVER_LOG_LEVEL:-4}
    ports:
      - '${SOLVER_GRPC_PORT:-7090}:7070'
      - '${SOLVER_HTTP_PORT:-7091}:7071'
    volumes:
      - solver_datadir:/app/data

volumes:
  ark_wallet_datadir:
  ark_datadir:
  boltz_datadir:
  boltz_lnd_datadir:
  boltz_fulmine_datadir:
  fulmine_delegator_datadir:
  solver_datadir:
