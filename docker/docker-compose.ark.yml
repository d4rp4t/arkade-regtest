name: nigiri
services:
  boltz-lnd:
    image: ${BOLTZ_LND_IMAGE}
    restart: unless-stopped
    container_name: boltz-lnd
    environment:
      LND_CHAIN: 'btc'
      LND_ENVIRONMENT: 'regtest'
      LND_EXPLORERURL: 'http://nbxplorer:32838/'
      LND_REST_LISTEN_HOST: http://boltz-lnd:8080
      LND_EXTRA_ARGS: |
        bitcoin.node=bitcoind
        maxpendingchannels=10
        rpclisten=0.0.0.0:10009
        restlisten=boltz-lnd:8080
        bitcoind.rpchost=bitcoin:18443
        bitcoind.rpcuser=admin1
        bitcoind.rpcpass=123
        bitcoind.zmqpubrawblock=tcp://bitcoin:28332
        bitcoind.zmqpubrawtx=tcp://bitcoin:28333
        db.bolt.auto-compact=true
        db.prune-revocation=true
        alias=Ark Labs
        externalip=boltz-lnd:9735
        protocol.option-scid-alias=true
        protocol.wumbo-channels=true
        accept-keysend=true
        minchansize=25000
        noseedbackup=false
        gc-canceled-invoices-on-startup=true
        coin-selection-strategy=random
        protocol.custom-message=513
        protocol.custom-nodeann=39
        protocol.custom-init=39
        no-rest-tls=1
        tlsextradomain=boltz-lnd
        debuglevel=debug
        restcors=*
    volumes:
      - boltz_lnd_datadir:/root/.lnd
    ports:
      - '${BOLTZ_LND_P2P_PORT}:9735'
      - '${BOLTZ_LND_RPC_PORT}:10009'

  boltz-fulmine:
    image: ${FULMINE_IMAGE}
    container_name: boltz-fulmine
    environment:
      - FULMINE_ARK_SERVER=http://ark:7070
      - FULMINE_ESPLORA_URL=http://chopsticks:3000
      - FULMINE_NO_MACAROONS=true
      - FULMINE_BOLTZ_URL=http://boltz:9001
      - FULMINE_BOLTZ_WS_URL=ws://boltz:9001
      - FULMINE_DISABLE_TELEMETRY=true
      - FULMINE_UNLOCKER_TYPE=env
      - FULMINE_UNLOCKER_PASSWORD=password
      - FULMINE_LND_URL=http://boltz-lnd:10009
      - FULMINE_LND_DATADIR=/root/.lnd
      - FULMINE_DELEGATOR_ENABLED=true
      - FULMINE_DELEGATOR_FEE=350
    ports:
      - ${FULMINE_GRPC_PORT}:7000
      - ${FULMINE_API_PORT}:7001
      - ${FULMINE_HTTP_PORT}:7002
    volumes:
      - boltz_fulmine_datadir:/app/data
      - boltz_lnd_datadir:/root/.lnd
    restart: unless-stopped

  fulmine-delegator:
    image: ${FULMINE_IMAGE}
    container_name: fulmine-delegator
    environment:
      - FULMINE_ARK_SERVER=http://ark:7070
      - FULMINE_ESPLORA_URL=http://chopsticks:3000
      - FULMINE_NO_MACAROONS=true
      - FULMINE_DISABLE_TELEMETRY=true
      - FULMINE_UNLOCKER_TYPE=env
      - FULMINE_UNLOCKER_PASSWORD=password
      - FULMINE_DELEGATOR_ENABLED=true
    ports:
      - ${DELEGATOR_GRPC_PORT}:7000
      - ${DELEGATOR_API_PORT}:7001
      - ${DELEGATOR_HTTP_PORT}:7002
    volumes:
      - fulmine_delegator_datadir:/app/data
    restart: unless-stopped

  nginx-boltz:
    image: ${NGINX_IMAGE}
    container_name: nginx-boltz
    restart: unless-stopped
    ports:
      - '${NGINX_PORT}:9069'
    volumes:
      - ./cors.nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - boltz

  boltz:
    image: ${BOLTZ_IMAGE}
    container_name: boltz
    restart: unless-stopped
    ports:
      - '${BOLTZ_GRPC_PORT}:9000'
      - '${BOLTZ_API_PORT}:9001'
      - '${BOLTZ_WS_PORT}:9004'
    expose:
      - '9001'
    environment:
      BOLTZ_CONFIG: |
        loglevel = "debug"
        network = "regtest"

        [ark]
        host = "boltz-fulmine"
        port = 7000
        useLocktimeSeconds = true
        rescanInterval = 30

        [ark.unilateralDelays]
        claim = 444
        refund = 444
        refundWithoutReceiver = 720

        [api]
        host = "0.0.0.0"
        port = 9001
        cors = "*"

        [grpc]
        host = "0.0.0.0"
        port = 9000

        [sidecar]
        [sidecar.grpc]
        host = "0.0.0.0"
        port = 9003

        [sidecar.ws]
        host = "0.0.0.0"
        port = 9004

        [sidecar.api]
        host = "0.0.0.0"
        port = 9005

        [postgres]
        host = "postgres"
        port = 5432
        database = "boltz"
        username = "postgres"
        password = "postgres"

        [swap]
        deferredClaimSymbols = [ "BTC" ]

        [[pairs]]
        base = "ARK"
        quote = "BTC"
        rate = 1
        fee = 0.4
        swapInFee = 0.01
        invoiceExpiry = 3600
        maxSwapAmount = 4294967
        minSwapAmount = 1000

        [pairs.timeoutDelta]
        reverse = 1440
        chain = 1440
        swapMinimal = 1440
        swapMaximal = 2880
        swapTaproot = 10080

        [[currencies]]
        symbol = "BTC"
        network = "bitcoinRegtest"
        minWalletBalance = 10000000
        minLocalBalance = 10000000
        minRemoteBalance = 10000000
        maxSwapAmount = 4294967
        minSwapAmount = 50000
        maxZeroConfAmount = 100000
        preferredWallet = "core"

        [currencies.chain]
        host = "bitcoin"
        port = 18443
        user = "admin1"
        password = "123"
        zmqpubrawtx = "tcp://bitcoin:28333"
        zmqpubrawblock = "tcp://bitcoin:28332"

        [[currencies.lnds]]
        host = "boltz-lnd"
        port = 10009
        certpath = "/home/boltz/.lnd/tls.cert"
        macaroonpath = "/home/boltz/.lnd/data/chain/bitcoin/regtest/admin.macaroon"
    volumes:
      - boltz_datadir:/home/boltz/.boltz
      - boltz_lnd_datadir:/home/boltz/.lnd
    entrypoint:
      - sh
      - -c
      - |
        # Wait for postgres to be ready
        until PGPASSWORD=postgres psql -h postgres -U postgres -c '\q' 2>/dev/null; do
          echo "Waiting for postgres..."
          sleep 1
        done

        # Create database if it doesn't exist
        PGPASSWORD=$$POSTGRES_PASSWORD psql -h postgres -U postgres -tc "SELECT 1 FROM pg_database WHERE datname = 'boltz'" | grep -q 1 || \
        PGPASSWORD=$$POSTGRES_PASSWORD psql -h postgres -U postgres -c "CREATE DATABASE boltz"

        # Start boltzd
        echo "$$BOLTZ_CONFIG" > /home/boltz/.boltz/boltz.config
        boltzd --datadir /home/boltz/.boltz --configpath /home/boltz/.boltz/boltz.config

  lnurl-server:
    image: ${LNURL_IMAGE}
    container_name: lnurl-server
    ports:
      - '${LNURL_PORT}:3000'
    environment:
      - PORT=3000
      - BASE_URL=http://localhost:${LNURL_PORT}
      - MIN_SENDABLE=1000
      - MAX_SENDABLE=100000000000
      - INVOICE_TIMEOUT_MS=30000
    restart: unless-stopped

  arkade-wallet:
    image: ${WALLET_IMAGE}
    container_name: arkade-wallet
    ports:
      - '${WALLET_PORT}:80'
    environment:
      - VITE_ARK_SERVER=http://localhost:7070
      - VITE_BOLTZ_URL=http://localhost:${NGINX_PORT}
      - VITE_NOSTR_RELAY_URL=ws://localhost:10547
      - VITE_DELEGATOR_URL=http://localhost:${DELEGATOR_HTTP_PORT}
      - VITE_LNURL_SERVER_URL=http://localhost:${LNURL_PORT}
    restart: unless-stopped

volumes:
  boltz_datadir:
  boltz_lnd_datadir:
  boltz_fulmine_datadir:
  fulmine_delegator_datadir:

networks:
  default:
    name: nigiri
    external: true
